{% comment %}
Uso: {% include 'partials/_empty_state.html' with message="Texto" icon="clipboard-x" variant="info" %}
icon: nombre de icono Bootstrap Icons sin el prefijo "bi-" (default: info-circle)
variant: clase de color Bootstrap alert-* (default: info)
{% endcomment %}
<div class="empty-state alert alert-{{ variant|default:"info" }} d-flex align-items-center gap-2 mb-0">
    <i class="bi bi-{{ icon|default:"info-circle" }}" aria-hidden="true"></i>
    <span>{{ message }}</span>
</div>
